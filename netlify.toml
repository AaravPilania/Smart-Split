[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

[functions."keep-alive"]
  schedule = "*/5 * * * *"

# Never cache the service worker or workbox runtime — browser must always get the latest
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
