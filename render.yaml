services:
  # Backend API — Node.js Web Service
  - type: web
    name: splitwise-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # Set this manually in the Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this manually in the Render dashboard
      - key: CORS_ORIGIN
        value: https://thesmartsplit.netlify.app
      - key: RENDER_EXTERNAL_URL
        value: https://smart-split-backend-yygp.onrender.com

  # Frontend — Static Site
  - type: web
    name: splitwise-frontend
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # Set to your Render backend URL, e.g. https://splitwise-backend.onrender.com/api
